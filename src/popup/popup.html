<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320" />
  <title>ZiPinYin-Menu</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>ZiPinYin-Menu</h1>

  <div class="ocr-action-row">
    <button id="ocr-btn" class="ocr-action-btn" title="Drag a rectangle over an image or non-selectable text to OCR it">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
        <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
        <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <rect x="8" y="9" width="8" height="6" rx="1"/>
      </svg>
      <span>Select area</span>
    </button>
    <button id="page-decode-btn" class="ocr-action-btn" title="OCR the visible viewport and overlay clickable real text on top of cipher-protected pages (e.g. fanqienovel)">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="14" rx="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="3" y1="13" x2="21" y2="13"/>
      </svg>
      <span>Scan screen</span>
    </button>
  </div>
  <button id="library-btn">Open Library</button>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="settings">Settings</button>
    <button class="tab-btn" data-tab="vocab">Recents</button>
  </div>

  <div id="tab-settings">
    <!-- AI Translations toggle group -->
    <div class="ai-section">
      <div class="ai-section-header">
        <label class="switch-label" for="llm-enabled">
          <input type="checkbox" id="llm-enabled" class="switch-input" />
          <span class="switch-track" aria-hidden="true">
            <span class="switch-thumb"></span>
          </span>
          <span class="switch-text">AI Translations</span>
        </label>
        <button
          type="button"
          id="ai-info-btn"
          class="info-btn"
          aria-label="About AI Translations"
          aria-expanded="false"
          aria-controls="ai-info-popover"
        >i</button>
        <div
          id="ai-info-popover"
          class="info-popover hidden"
          role="tooltip"
        >AI translations use an LLM (e.g. Gemini, OpenAI) to provide context-aware translations of selected text. Requires your own API key.</div>
      </div>

      <div id="ai-config-fields">
        <!-- LLM Provider -->
        <div class="form-group">
          <label for="provider">LLM Provider</label>
          <select id="provider">
            <option value="openai">OpenAI</option>
            <option value="gemini">Google Gemini</option>
            <option value="ollama">Ollama (local)</option>
            <option value="custom">Custom</option>
          </select>
        </div>

        <!-- API Key -->
        <div class="form-group" id="api-key-group">
          <label for="api-key">API Key</label>
          <div class="input-row">
            <input type="password" id="api-key" placeholder="Enter API key" />
            <button type="button" id="toggle-key" title="Show/hide API key">Show</button>
          </div>
        </div>

        <!-- Base URL -->
        <div class="form-group">
          <label for="base-url">API Base URL</label>
          <input type="text" id="base-url" placeholder="https://api.openai.com/v1" />
        </div>

        <!-- Model -->
        <div class="form-group">
          <label for="model">Model</label>
          <div class="input-row">
            <select id="model"></select>
            <button type="button" id="refresh-models" class="hidden" title="Refresh model list">&#x21bb;</button>
          </div>
          <input type="text" id="custom-model" placeholder="Enter model name" class="hidden" />
        </div>

        <p id="api-key-warning" class="inline-warning hidden">API key required</p>
      </div>
    </div>

    <!-- Lookup behavior (independent of AI) -->
    <div class="lookup-behavior">
      <!-- Auto-show Overlay -->
      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="overlay-enabled" />
          Auto-show overlay on text selection
        </label>
        <p class="setting-hint">When off, use the right-click menu or Alt+Shift+P to look up selected text on demand.</p>
      </div>

      <!-- TTS Mode -->
      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="tts-enabled" />
          Enable text-to-speech pronunciation
        </label>
      </div>
    </div>

    <hr class="section-divider" />

    <!-- Pinyin Style -->
    <div class="form-group">
      <label>Pinyin Style</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="pinyin-style" value="toneMarks" />
          Tone marks <span class="example">hàn yǔ</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="pinyin-style" value="toneNumbers" />
          Tone numbers <span class="example">han4 yu3</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="pinyin-style" value="none" />
          No tones <span class="example">han yu</span>
        </label>
      </div>
    </div>

    <!-- Display Script (vocab-card / hub dictionary surfaces only) -->
    <div class="form-group">
      <label>Display Script</label>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="display-script" value="simplified" />
          Simplified <span class="example">汉语</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="display-script" value="traditional" />
          Traditional <span class="example">漢語</span>
        </label>
      </div>
    </div>

    <!-- Font Size -->
    <div class="form-group">
      <label for="font-size">Font Size: <span id="font-size-label">16</span>px</label>
      <input type="range" id="font-size" min="12" max="24" step="1" />
    </div>

    <!-- Theme -->
    <div class="form-group">
      <label for="theme">Theme</label>
      <select id="theme">
        <option value="auto">Auto</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="sepia">Sepia</option>
      </select>
    </div>

    <button id="save-btn">Save Settings</button>
    <div id="status"></div>
  </div>

  <div id="tab-vocab" class="hidden">
    <div id="vocab-list"></div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
